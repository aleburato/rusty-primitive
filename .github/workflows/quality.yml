name: Quality

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_call:

permissions:
  contents: read

jobs:
  rust-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check

      - run: cargo clippy --all-targets -- -D warnings

      - run: cargo test

  package-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run check:napi-targets

      - run: npm run test:tooling

      - run: npm run typecheck

      - run: npm test

      - run: npm pack --dry-run

  hygiene:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Lint workflows
        run: $(go env GOPATH)/bin/actionlint -color
        shell: bash

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2

      - name: Install typos-cli
        run: cargo install typos-cli --version 1.44.0 --locked

      - name: Check spelling
        run: typos --force-exclude .
